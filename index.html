<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Shooting game</title>

        <link rel="icon" href="icon.png">

    <style>
        /* キャンバスの枠線を見えるようにする */
        canvas {
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <h1>Simple Shooting Game</h1>
    <p>
    <strong>Move:</strong> Arrow Keys (↑ ↓ ← →) <br>
    <strong>Shoot:</strong> W (Up), S (Down), A (Left), D (Right)
    </p>
    <canvas id="myCanvas" width="1500" height="800"></canvas>
    <script src="script.js"></script>
</body>
</html>
